<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface-container-low text-on-surface min-h-screen flex flex-col">
<!-- Top App Bar -->
<header class="bg-surface-container-lowest dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flex justify-between items-center px-margin-mobile h-touch-target-min w-full fixed top-0 z-50">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center hover:bg-surface-container dark:hover:bg-surface-variant rounded-full transition-transform active:scale-95">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Add New Customer</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center hover:bg-surface-container dark:hover:bg-surface-variant rounded-full transition-transform active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant dark:text-surface-variant">account_circle</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-24 px-margin-mobile pb-32 max-w-xl mx-auto w-full">
<!-- Import from Contacts CTA -->
<section class="mb-stack-lg">
<button class="w-full flex items-center justify-between p-stack-md bg-secondary-container text-on-secondary-container rounded-xl shadow-sm border border-secondary-fixed-dim transition-all active:opacity-80 active:scale-[0.98]">
<div class="flex items-center gap-stack-md">
<div class="w-12 h-12 rounded-full bg-on-secondary-container text-on-secondary flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">contact_page</span>
</div>
<div class="text-left">
<p class="font-label-lg text-label-lg">Import from Contacts</p>
<p class="font-label-sm text-label-sm opacity-80">Add customers instantly from your phonebook</p>
</div>
</div>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</section>
<!-- Manual Entry Form -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-stack-lg space-y-stack-lg">
<h2 class="font-headline-sm text-headline-sm text-primary mb-4">Customer Details</h2>
<!-- Customer Name Field -->
<div class="floating-label-group">
<input class="w-full h-touch-target-min border-2 border-outline-variant focus:border-primary rounded-lg px-4 pt-2 font-body-md text-body-md transition-colors outline-none" id="cust_name" name="cust_name" placeholder=" " type="text"/>
<label class="font-label-lg text-label-lg text-on-surface-variant" for="cust_name">Customer Name</label>
</div>
<!-- Phone Number Field -->
<div class="floating-label-group">
<div class="flex items-center absolute left-4 top-4 text-on-surface-variant">
<span class="font-label-lg text-label-lg border-r border-outline-variant pr-2 mr-2">+91</span>
</div>
<input class="w-full h-touch-target-min border-2 border-outline-variant focus:border-primary rounded-lg pl-16 pr-4 pt-2 font-body-md text-body-md transition-colors outline-none" id="phone_number" name="phone_number" placeholder=" " type="tel"/>
<label class="font-label-lg text-label-lg text-on-surface-variant ml-12" for="phone_number">Phone Number</label>
</div>
<!-- Opening Balance Field -->
<div class="space-y-2">
<div class="floating-label-group">
<input class="w-full h-touch-target-min border-2 border-outline-variant focus:border-primary rounded-lg px-4 pt-2 font-body-md text-body-md transition-colors outline-none" id="opening_balance" name="opening_balance" placeholder=" " type="number"/>
<label class="font-label-lg text-label-lg text-on-surface-variant" for="opening_balance">Opening Balance (Optional)</label>
<div class="absolute right-4 top-4 text-outline">
<span class="font-label-lg text-label-lg">₹</span>
</div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant px-1">Enter the current credit or advance amount for this customer.</p>
</div>
<!-- Additional Professional Detail -->
<div class="pt-4 border-t border-outline-variant mt-stack-lg">
<div class="flex items-center gap-3 text-secondary">
<span class="material-symbols-outlined text-[20px]">verified_user</span>
<p class="font-label-sm text-label-sm">This customer data is encrypted and synced to RetailDost Cloud.</p>
</div>
</div>
</div>
<!-- Visual Anchor / Illustration -->
<div class="mt-12 opacity-20 flex flex-col items-center">
<img alt="Merchant ledger" class="w-48 h-48 object-contain grayscale" data-alt="A clean and professional digital illustration of a stylized leather-bound merchant ledger book sitting on a minimalist white surface. The scene is illuminated by soft, professional studio lighting, emphasizing the textures of the cover and the crisp white pages inside. The color palette is strictly deep indigo and white, creating a high-contrast corporate aesthetic that evokes trust, reliability, and modern commerce." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBs62H0lvRfyD5xZ2fG9awj9bTkCdp9TDimbm_9pr6wxL7bso9hPvOEz1vy4y18Uk6vHdLNeFd-LkknUaQIoNprgAea_Nes1YMNNyb556-nub2Y2LwxKyZYQ6pV6RVZtahaAWg2DduENlpwgoIlc9Gos-O6cx6QnjDG8T7w8NB7nUIOzui--tY2LrMPMC49AxlL8wY3VHLRRQsUZtHvvnvYe975qiCJDrUZ3U1U5HSYIt-kK6pGWQwo247W6duhPB-m3LWewJOIWq8"/>
<p class="font-label-sm text-label-sm text-center mt-4">Professional Digital Ledger for Your Shop</p>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest border-t border-outline-variant px-margin-mobile py-4 z-50">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-label-lg text-label-lg rounded-full shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95 active:opacity-90" id="submit_btn">
<span class="material-symbols-outlined">person_add</span>
            Create Customer
        </button>
</div>
<!-- Hidden Navigation Shell Logic (Suppressed as per "Task-Focused" rule) -->
<!-- BottomNavBar is suppressed because this is a Focused Creation journey -->
<script>
        // Micro-interaction for the primary button
        const submitBtn = document.getElementById('submit_btn');
        submitBtn.addEventListener('click', () => {
            const name = document.getElementById('cust_name').value;
            if(!name) {
                alert('Please enter a customer name to proceed.');
                return;
            }
            
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Creating...';
            submitBtn.classList.add('bg-on-primary-fixed-variant');
            
            setTimeout(() => {
                submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Customer Added';
                submitBtn.classList.remove('bg-on-primary-fixed-variant');
                submitBtn.classList.add('bg-secondary');
            }, 1200);
        });

        // Autofocus name field on load
        window.onload = () => {
            document.getElementById('cust_name').focus();
        };
    </script>
</body></html>
