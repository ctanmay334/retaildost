<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Add New Product - RetailDost Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0b1a7d",
                        "on-tertiary-fixed-variant": "#793105",
                        "surface-container-highest": "#e4e1ea",
                        "on-surface": "#1b1b21",
                        "surface-container-high": "#e9e7f0",
                        "surface-bright": "#fbf8ff",
                        "inverse-primary": "#bcc2ff",
                        "primary-container": "#283593",
                        "outline-variant": "#c6c5d4",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#454652",
                        "surface-container-low": "#f5f2fb",
                        "on-primary-container": "#9aa5ff",
                        "on-secondary-fixed": "#00201b",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#f79261",
                        "inverse-on-surface": "#f2eff8",
                        "tertiary-container": "#702a00",
                        "surface-tint": "#4955b3",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffdbcc",
                        "secondary-fixed-dim": "#7ad7c6",
                        "surface": "#fbf8ff",
                        "surface-variant": "#e4e1ea",
                        "primary-fixed-dim": "#bcc2ff",
                        "primary-fixed": "#dfe0ff",
                        "on-secondary-container": "#006f62",
                        "tertiary-fixed-dim": "#ffb694",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#303c9a",
                        "surface-container": "#efedf5",
                        "tertiary": "#4c1a00",
                        "on-secondary-fixed-variant": "#005047",
                        "on-primary-fixed": "#000c62",
                        "background": "#fbf8ff",
                        "on-primary": "#ffffff",
                        "secondary": "#006b5e",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "on-background": "#1b1b21",
                        "outline": "#767683",
                        "inverse-surface": "#303036",
                        "on-tertiary-fixed": "#351000",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dbd9e1",
                        "secondary-container": "#94f0df",
                        "secondary-fixed": "#97f3e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "stack-md": "16px",
                        "gutter-mobile": "12px",
                        "stack-lg": "24px",
                        "touch-target-min": "56px",
                        "baseline": "8px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #fbf8ff; -webkit-tap-highlight-color: transparent; }
        .input-group:focus-within label { color: #0b1a7d; transform: translateY(-1.5rem) scale(0.85); }
        .floating-label { transition: all 0.2s ease-out; pointer-events: none; }
        .input-field:not(:placeholder-shown) + .floating-label { transform: translateY(-1.5rem) scale(0.85); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .input-field { background-color: #f5f2fb; }
    </style>
</head>
<body class="font-body-md text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface flex items-center px-margin-mobile h-touch-target-min border-b border-outline-variant">
<button aria-label="Go Back" class="active:scale-95 transition-transform p-2 rounded-full -ml-2">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="ml-4 font-headline-sm text-on-surface">Add New Product</h1>
</header>
<main class="pt-20 pb-32 max-w-xl mx-auto px-margin-mobile">
<form class="space-y-stack-lg" id="productForm">
<!-- Image Upload Section -->
<div class="bg-surface-container-lowest rounded-xl border-2 border-dashed border-outline-variant p-8 flex flex-col items-center justify-center gap-3 transition-colors hover:bg-surface-container-low cursor-pointer">
<div class="w-14 h-14 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">photo_camera</span>
</div>
<div class="text-center">
<p class="font-label-lg text-primary">Add Product Image</p>
<p class="font-label-sm text-on-surface-variant">Supports JPG, PNG (Max 5MB)</p>
</div>
<input class="hidden" id="imageInput" type="file"/>
</div>
<!-- Section 1: Basic Info -->
<section class="space-y-stack-md">
<h2 class="font-label-lg text-primary uppercase tracking-wider px-1">Basic Info</h2>
<div class="space-y-stack-sm">
<div class="relative group">
<input class="input-field block w-full h-touch-target-min px-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all peer" id="product_name" placeholder=" " required="" type="text"/>
<label class="floating-label absolute left-4 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="product_name">
                            Product Name*
                        </label>
</div>
<div class="grid grid-cols-2 gap-stack-sm">
<div class="relative group">
<select class="input-field block w-full h-touch-target-min px-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer appearance-none" id="category">
<option disabled="" selected="" value=""></option>
<option value="groceries">Groceries</option>
<option value="beverages">Beverages</option>
<option value="dairy">Dairy &amp; Eggs</option>
</select>
<label class="floating-label absolute left-4 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="category">
                                Category
                            </label>
<span class="material-symbols-outlined absolute right-4 top-4 pointer-events-none text-outline">expand_more</span>
</div>
<div class="relative group">
<input class="input-field block w-full h-touch-target-min px-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer" id="sku" placeholder=" " type="text"/>
<label class="floating-label absolute left-4 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="sku">
                                SKU / ID
                            </label>
</div>
</div>
</div>
</section>
<!-- Section 2: Pricing -->
<section class="space-y-stack-md">
<h2 class="font-label-lg text-primary uppercase tracking-wider px-1">Pricing</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-stack-sm">
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">₹</span>
<input class="input-field block w-full h-touch-target-min pl-8 pr-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer" id="purchase_price" placeholder=" " type="number"/>
<label class="floating-label absolute left-8 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="purchase_price">
                            Purchase Price
                        </label>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">₹</span>
<input class="input-field block w-full h-touch-target-min pl-8 pr-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer" id="selling_price" placeholder=" " type="number"/>
<label class="floating-label absolute left-8 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="selling_price">
                            Selling Price
                        </label>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">₹</span>
<input class="input-field block w-full h-touch-target-min pl-8 pr-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer" id="mrp" placeholder=" " type="number"/>
<label class="floating-label absolute left-8 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="mrp">
                            MRP
                        </label>
</div>
</div>
</section>
<!-- Section 3: Inventory Settings -->
<section class="space-y-stack-md">
<h2 class="font-label-lg text-primary uppercase tracking-wider px-1">Inventory Settings</h2>
<div class="grid grid-cols-2 gap-stack-sm">
<div class="relative group">
<input class="input-field block w-full h-touch-target-min px-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer" id="opening_stock" placeholder=" " type="number"/>
<label class="floating-label absolute left-4 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="opening_stock">
                            Opening Stock
                        </label>
</div>
<div class="relative group">
<input class="input-field block w-full h-touch-target-min px-4 pt-4 pb-1 text-on-surface border border-outline-variant rounded-xl focus:outline-none focus:border-primary transition-all peer" id="threshold" placeholder=" " type="number"/>
<label class="floating-label absolute left-4 top-4 text-on-surface-variant origin-[0] font-label-lg peer-focus:text-primary" for="threshold">
                            Low Stock Alert
                        </label>
</div>
</div>
</section>
<p class="text-on-surface-variant font-label-sm italic px-1">Fields marked with * are mandatory.</p>
<!-- Actions -->
<div class="pt-4">
<button class="w-full h-14 bg-primary text-on-primary font-headline-sm rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition-transform" type="submit">
<span class="material-symbols-outlined">save</span>
                    Save Product
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-surface border-t border-outline-variant flex justify-around items-center h-20">
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-primary">
<div class="bg-primary-container/30 px-6 py-1 rounded-full mb-1">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<span class="font-label-sm font-bold">Stock</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-sm">Khata</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">storefront</span>
<span class="font-label-sm">Market</span>
</div>
</nav>
<script>
        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Saved Successfully';
                btn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-secondary', 'bg-primary');
                    btn.disabled = false;
                    e.target.reset();
                }, 2000);
            }, 1200);
        });

        // Simple click for image upload area simulation
        document.querySelector('.border-dashed').addEventListener('click', () => {
            document.getElementById('imageInput').click();
        });
    </script>
</body></html>
